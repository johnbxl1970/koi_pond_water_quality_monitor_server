##--------------------------------------------------------------------
## EMQX authorization chain.
## Rendered into EMQX_CONF_AUTHZ__SOURCES via docker-compose.
##
## For full cert-based auth, we'd use:
##   authentication = [{mechanism = ssl, ssl_cert = ...}]
## and an authz source of type `file` with acl.conf below. This file documents
## the intent; wiring it into EMQX in dev is optional because the dev broker
## runs with anonymous auth enabled.
##--------------------------------------------------------------------

authorization {
  no_match = deny
  deny_action = ignore
  cache { enable = true }
  sources = [
    { type = file, enable = true, path = "/opt/emqx/etc/acl.conf" }
  ]
}
