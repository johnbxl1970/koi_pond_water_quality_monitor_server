%%--------------------------------------------------------------------
%% EMQX file-based ACL rules for the koi pond monitor.
%%
%% Topic layout:
%%   provisioning/{hardwareId}/request   — device publishes CSR (bootstrap cert)
%%   provisioning/{hardwareId}/response  — server publishes issued cert
%%   koi/{hardwareId}/telemetry          — device publishes telemetry (op cert)
%%   koi/{hardwareId}/status             — device publishes liveness/fw version
%%   koi/{hardwareId}/cmd/+              — server publishes commands to device
%%
%% Scope enforcement:
%%   - "server" user (the NestJS ingest service) can do anything. Authenticate
%%     via username/password from EMQX dashboard or env.
%%   - Devices authenticate with X.509 client certs. EMQX maps cert CN →
%%     username via peer cert authn. A bootstrap cert has CN "bootstrap" and
%%     is shared across all unprovisioned devices. An operational cert has CN
%%     equal to the device's hardware ID.
%%
%% Rule evaluation is first-match-wins. Put specific rules before broad denies.
%%--------------------------------------------------------------------

%% Server service account — full access.
{allow, {user, "koi-server"}, all, ["#"]}.

%% Bootstrap cert — can ONLY publish to provisioning/+/request and subscribe
%% to provisioning/+/response. Cannot touch koi/# topics. The bootstrap cert's
%% CN is the literal string "bootstrap".
{allow, {user, "bootstrap"}, publish,   ["provisioning/+/request"]}.
{allow, {user, "bootstrap"}, subscribe, ["provisioning/+/response"]}.
{deny,  {user, "bootstrap"}, all,       ["#"]}.

%% Operational certs — CN equals the device's hardware ID (e.g. "koi-a1b2c3d4").
%% EMQX substitutes ${username} with the authenticated username (CN).
{allow, {username, {re, "^koi-"}}, publish,   ["koi/${username}/telemetry",
                                               "koi/${username}/status"]}.
{allow, {username, {re, "^koi-"}}, subscribe, ["koi/${username}/cmd/+"]}.

%% Devices may also publish a CSR on their own hardwareId topic during cert
%% renewal (operational cert still valid, just refreshing).
{allow, {username, {re, "^koi-"}}, publish,   ["provisioning/${username}/request"]}.
{allow, {username, {re, "^koi-"}}, subscribe, ["provisioning/${username}/response"]}.

%% Default deny — anything not explicitly allowed is rejected.
{deny, all, all, ["#"]}.
