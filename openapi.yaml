info:
  title: Koi Pond Water Quality Monitor
  description: Server API for pond telemetry, alerts, and recommendations
  version: 0.1.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    RegisterDto:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        displayName:
          type: string
      required:
        - email
        - password
    LoginDto:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    RefreshDto:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    PreRegisterClaimDto:
      type: object
      properties:
        hardwareId:
          type: string
          description: Stable hardware ID derived from the device pubkey
        pubkeyFingerprint:
          type: string
          description: SHA-256 fingerprint of the device pubkey, hex
        attestationCertPem:
          type: string
          description: Device attestation certificate (PEM)
        claimToken:
          type: string
          description: Plaintext claim token (base32, 26 chars)
      required:
        - hardwareId
        - pubkeyFingerprint
        - attestationCertPem
        - claimToken
    ClaimDeviceDto:
      type: object
      properties:
        claimToken:
          type: string
          description: Claim token from the device QR code
        pondId:
          type: string
          description: Pond to bind the device to
      required:
        - claimToken
        - pondId
    CreatePondDto:
      type: object
      properties:
        name:
          type: string
        volumeM3:
          type: number
          description: Pond volume in cubic meters
        koiCount:
          type: number
        latitude:
          type: number
        longitude:
          type: number
        timezone:
          type: string
      required:
        - name
        - volumeM3
        - koiCount
        - latitude
        - longitude
    UpdatePondDto:
      type: object
      properties:
        name:
          type: string
        volumeM3:
          type: number
        koiCount:
          type: number
        latitude:
          type: number
        longitude:
          type: number
        timezone:
          type: string
    CreateDeviceDto:
      type: object
      properties:
        pondId:
          type: string
        hardwareId:
          type: string
        label:
          type: string
        firmwareVer:
          type: string
      required:
        - pondId
        - hardwareId
    UpdateDeviceDto:
      type: object
      properties:
        label:
          type: string
        firmwareVer:
          type: string
    CreateManualReadingDto:
      type: object
      properties:
        time:
          type: string
          description: ISO timestamp; defaults to now
        notes:
          type: string
          description: Free-form note (≤ 500 chars)
        phVal:
          type: number
        tempC:
          type: number
        doMgL:
          type: number
        orpMv:
          type: number
        tdsPpm:
          type: number
        turbidityNtu:
          type: number
        nh3TotalPpm:
          type: number
        no2Ppm:
          type: number
        no3Ppm:
          type: number
        khDkh:
          type: number
        ghDgh:
          type: number
